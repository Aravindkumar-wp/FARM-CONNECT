<!DOCTYPE html>
<html>

<head>
    <title>Update Crop</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2e7d32;
        }

        label {
            font-weight: bold;
            font-size: 14px;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #2e7d32;
        }

        .disabled-input {
            background: #eee;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1b5e20;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2>🌾 Update Crop</h2>

        <form method="POST">

            <label>Crop Name</label>
            <input type="text" value="{{ crop[1] }}" class="disabled-input" disabled>

            <label>Price (₹)</label>
            <input type="number" name="price" value="{{ crop[2] }}" required>

            <label>Quantity (kg)</label>
            <input type="number" name="quantity" value="{{ crop[3] }}" required>

            <button type="submit">Update Crop</button>

        </form>

        <a class="back" href="/market">← Back to Market</a>

    </div>

</body>

</html>
