<!DOCTYPE html>
<html>

<head>
    <title>Farmer Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: #2e7d32;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .total {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>

</head>

<body>

    <h1>📊 Farmer Dashboard</h1>
    <h2>🌱 Total Crops: {{ total_crops }}</h2>
    <table>
        <tr>
            <th>Crop</th>
            <th>📦 Available (kg)</th>
            <th>🛒 Sold (kg)</th>
            <th>💰 Revenue (₹)</th>
        </tr>

        {% for crop in crop_data %}
        <tr>
            <td>{{ crop[0] }}</td>
            <td>{{ crop[1] }} kg</td>
            <td>{{ crop[2] }} kg</td>
            <td>₹{{ crop[3] }}</td>
        </tr>
        {% endfor %}

    </table>

    <div class="total">
        Total Revenue: ₹{{ total_revenue }}
    </div>

    <br>
    <a href="/market">⬅ Back to Market</a>

</body>

</html>
